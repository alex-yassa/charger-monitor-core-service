spring.application.name=monitor
server.port=8080
server.servlet.context-path=/charger-monitor/api

# MQTT (Mosquitto) configuration
mqtt.broker=tcp://inverters.pl:1883
mqtt.clientId=shm-monitor-server
mqtt.username=alex
mqtt.password=123
mqtt.default-topic=shm.monitor/#
mqtt.qos=1
mqtt.keep-alive-interval=60
mqtt.connection-timeout=30
mqtt.reconnectionDelaySec=5

# Kafka configuration
# Set kafka.enabled=true to re-enable Kafka integration
kafka.enabled=false
kafka.bootstrap-servers=localhost:9092
kafka.group-id=monitor-group
kafka.client-id=monitor-client
kafka.default-topic=monitor
kafka.auto-offset-reset=earliest
kafka.enable-auto-commit=true

spring.datasource.url=jdbc:postgresql://localhost:6433/charger-monitor-db
spring.datasource.username=alex
spring.datasource.password=112233
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:db.changelog/db.changelog-master.yaml

# JWT
jwt.secret=change-me-to-a-very-long-and-secure-secret-key-at-least-256-bits
jwt.expiration-ms=86400000

# InfluxDB configuration
influx.url=http://192.168.1.23:8286
influx.token=${INFLUXDB_INIT_ADMIN_TOKEN}
influx.org=${INFLUXDB_INIT_ORG}
influx.bucket=${INFLUXDB_INIT_BUCKET}
influx.measurement=sensor_data

